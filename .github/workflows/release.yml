name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: hackathon

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-test-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libfontconfig1-dev libssl-dev

      - name: Run tests
        run: cargo test --locked --features pdf

  build:
    name: Build linux-x86_64
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-release-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libfontconfig1-dev libssl-dev

      - name: Build
        run: cargo build --release --locked --features pdf

      - name: Package
        id: package
        run: |
          ARCHIVE="${{ env.BINARY_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.gz"
          cp target/release/${{ env.BINARY_NAME }} ${{ env.BINARY_NAME }}
          tar -czf "$ARCHIVE" ${{ env.BINARY_NAME }} .env_example
          echo "asset=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-x86_64
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ### Installation (Linux x86_64)
            ```bash
            tar -xzf hackathon-${{ github.ref_name }}-linux-x86_64.tar.gz
            chmod +x hackathon
            export TMT_API_TOKEN=your_token_here
            ./hackathon --help
            ```

            Verify your download with `SHA256SUMS.txt`.
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
