name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: hackathon

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Install system deps needed by the pdf feature on Linux
      - name: Install pdf system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libfontconfig1-dev

      - name: Run tests (default features)
        run: cargo test --locked

      - name: Run tests (with pdf feature)
        if: runner.os == 'Linux'
        run: cargo test --locked --features pdf

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (default + pdf)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            features: pdf
            ext: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64
            features: pdf
            ext: ""
            cross: true

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64
            features: ""
            ext: ""

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
            features: ""
            ext: ""

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            features: ""
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # System deps for pdf feature on Linux native builds
      - name: Install pdf system deps (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libfontconfig1-dev

      # cross for ARM64 Linux cross-compilation
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release --locked --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Build (cross)
        if: matrix.cross == true
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cross build --release --locked --target ${{ matrix.target }} --features "$FEATURES"
          else
            cross build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      # ── Package the binary ──────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          ARCHIVE="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz"
          cp "$BINARY" "${{ env.BINARY_NAME }}"
          tar -czf "$ARCHIVE" "${{ env.BINARY_NAME }}" .env_example
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe"
          $archive = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip"
          Copy-Item $binary "${{ env.BINARY_NAME }}.exe"
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe", ".env_example" -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }}
          path: ${{ env.ASSET }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          echo "BODY=Release ${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ### Installation
            Download the binary for your platform below, extract it, and place `tmt-hackathon` (or `tmt-hackathon.exe`) somewhere on your `PATH`.

            Set your API token before use:
            ```bash
            export TMT_API_TOKEN=your_token_here
            ```

            ### Assets
            | Platform | File |
            |----------|------|
            | Linux x86_64 (with PDF support) | `*-linux-x86_64.tar.gz` |
            | Linux ARM64  (with PDF support) | `*-linux-aarch64.tar.gz` |
            | macOS Apple Silicon | `*-macos-aarch64.tar.gz` |
            | macOS Intel | `*-macos-x86_64.tar.gz` |
            | Windows x86_64 | `*-windows-x86_64.zip` |

            Verify your download with `SHA256SUMS.txt`.
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


